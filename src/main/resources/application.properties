spring.application.name=garageops

server.port=${PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# --- Owner credentials (in-memory placeholder; S-01 swaps for a DB-backed user store) ---
# Hash is BCrypt — never store plaintext. Set OWNER_* env vars in deploy; the fallback is a
# documented local-dev pair (see context/changes/access-control-foundation/dev-credentials.md).
garageops.owner.username=${OWNER_USERNAME:owner}
garageops.owner.password-hash=${OWNER_PASSWORD_HASH:$2a$10$QMGr6Q3SaPmUEkg6/ukov.oRuLjMXe502Lj5WHIgrWAi/dGcBh26a}

# --- Datasource (Railway service-link injects PG* vars) ---
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5433}/${PGDATABASE:garageops}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP pool sized for 512MB Hobby tier + Postgres max_connections~100
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true
spring.flyway.fail-on-missing-locations=true
