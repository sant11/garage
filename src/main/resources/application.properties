spring.application.name=garageops

server.port=${PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# --- Owner credentials (bootstrap seed for the DB-backed user store) ---
# On first boot with an empty users table, OwnerBootstrap seeds one owner row from these values;
# subsequent boots are idempotent. Hash is BCrypt — never store plaintext. Set OWNER_* env vars in
# deploy; the fallbacks are a documented local-dev set (see
# context/changes/access-control-foundation/dev-credentials.md).
garageops.owner.username=${OWNER_USERNAME:owner}
garageops.owner.email=${OWNER_EMAIL:owner@example.com}
garageops.owner.password-hash=${OWNER_PASSWORD_HASH:$2a$10$QMGr6Q3SaPmUEkg6/ukov.oRuLjMXe502Lj5WHIgrWAi/dGcBh26a}

# --- Datasource (Railway service-link injects PG* vars) ---
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5433}/${PGDATABASE:garageops}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP pool sized for 512MB Hobby tier + Postgres max_connections~100
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# --- JPA ---
# Flyway owns the schema; Hibernate only validates that entities match the migrated tables.
# No dialect set — auto-detected from the Postgres connection. open-in-view disabled to keep
# DB sessions request-scoped to the transactional boundary (no OSIV anti-pattern / startup warning).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true
spring.flyway.fail-on-missing-locations=true
